<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e1b4b" />
    </linearGradient>
    <!-- Brand Gradient -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Card -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" stroke="rgba(255, 255, 255, 0.05)" stroke-width="8" />

  <!-- Outer Border Ring -->
  <rect x="24" y="24" width="464" height="464" rx="104" fill="none" stroke="url(#brandGrad)" stroke-width="4" opacity="0.3" />

  <!-- Cash Register & Terminal Graphics -->
  <g transform="translate(100, 110)">
    <!-- Base / Stand of Register -->
    <path d="M 20 230 C 20 220 30 210 40 210 L 272 210 C 282 210 292 220 292 230 C 292 240 282 250 272 250 L 40 250 C 30 250 20 240 20 230 Z" fill="url(#brandGrad)" />
    
    <!-- Main Body Keyboard Slope -->
    <path d="M 45 210 L 95 110 C 100 100 110 95 120 95 L 212 95 C 222 95 232 100 237 110 L 267 210 Z" fill="#1e293b" stroke="rgba(255,255,255,0.1)" stroke-width="4" />
    
    <!-- Screen Monitor -->
    <rect x="92" y="30" width="128" height="80" rx="12" fill="#0f172a" stroke="url(#brandGrad)" stroke-width="6" filter="url(#glow)" />
    
    <!-- Display Details inside Screen -->
    <rect x="108" y="46" width="96" height="8" rx="4" fill="#22c55e" opacity="0.8" />
    <rect x="108" y="62" width="64" height="8" rx="4" fill="#3b82f6" opacity="0.8" />
    <rect x="108" y="78" width="80" height="8" rx="4" fill="#e2e8f0" opacity="0.5" />
    <circle cx="194" cy="66" r="6" fill="#ef4444" />
    
    <!-- Stand for Screen -->
    <rect x="146" y="110" width="20" height="15" fill="#334155" />
    
    <!-- Keypad details on slope -->
    <circle cx="112" cy="140" r="8" fill="url(#brandGrad)" />
    <circle cx="137" cy="140" r="8" fill="#334155" />
    <circle cx="162" cy="140" r="8" fill="#334155" />
    <circle cx="187" cy="140" r="8" fill="#334155" />
    <circle cx="212" cy="140" r="8" fill="#334155" />
    
    <circle cx="112" cy="165" r="8" fill="#334155" />
    <circle cx="137" cy="165" r="8" fill="url(#brandGrad)" />
    <circle cx="162" cy="165" r="8" fill="#334155" />
    <circle cx="187" cy="165" r="8" fill="#334155" />
    <circle cx="212" cy="165" r="8" fill="#334155" />
    
    <rect x="104" y="185" width="48" height="14" rx="6" fill="#334155" />
    <rect x="160" y="185" width="60" height="14" rx="6" fill="#22c55e" />
    
    <!-- Scanner Handheld -->
    <path d="M 260 90 L 280 150 L 265 160 L 245 100 Z" fill="#475569" />
    <rect x="250" y="80" width="20" height="15" rx="4" fill="url(#brandGrad)" />
    
    <!-- Receipt Paper rolling out -->
    <path d="M 60 210 V 270 L 70 265 L 80 270 L 90 265 L 100 270 L 110 265 L 120 270 V 210" fill="#ffffff" />
    <line x1="70" y1="225" x2="110" y2="225" stroke="#94a3b8" stroke-width="2" />
    <line x1="70" y1="235" x2="100" y2="235" stroke="#94a3b8" stroke-width="2" />
    <line x1="70" y1="245" x2="110" y2="245" stroke="#94a3b8" stroke-width="2" />
    <line x1="70" y1="255" x2="90" y2="255" stroke="#94a3b8" stroke-width="2" />
  </g>
</svg>
