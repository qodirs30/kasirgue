name: Build Android App (APK & AAB)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK & Play Store AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Build Web App (Vite)
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build Release APK & AAB (Play Store)
        run: |
          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: KasirGue-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK (Unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: KasirGue-Release-APK
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload Play Store AAB Bundle
        uses: actions/upload-artifact@v4
        with:
          name: KasirGue-PlayStore-AAB
          path: android/app/build/outputs/bundle/release/app-release.aab
